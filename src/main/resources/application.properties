quarkus.http.host=0.0.0.0

quarkus.datasource.db-kind=${DB_KIND:postgresql}
quarkus.datasource.username=${DB_USER:USER}
quarkus.datasource.password=${DB_PASS:PWD}

# jdbc:sqlserver://IP:1433;databaseName=DBNAME;integratedSecurity=false;encrypt=true;trustServerCertificate=true
quarkus.datasource.jdbc.url=${DB_URL:DBURL}
# MCP Tools Configuration

mcp.tool.list_tables.name=list_tables
mcp.tool.list_tables.description=${MCP_TOOL_LIST_TABLES_DESCRIPTION:List all available database tables (returns table names). Use this first to discover what entities exist (e.g., contacts, companies, deals, activities).}

mcp.tool.describe_table.name=describe_table
mcp.tool.describe_table.description=${MCP_TOOL_DESCRIBE_TABLE_DESCRIPTION:Get the schema/DDL for a specific database table (columns, types, keys/constraints if available). Use this to craft correct SQL queries against data.}
mcp.tool.describe_table.arg.tableName.description=The table name

mcp.tool.execute_sql.name=execute_sql
mcp.tool.execute_sql.description=${MCP_TOOL_EXECUTE_SQL_DESCRIPTION:Run a read-only SQL SELECT query on the database. Do not use for writes or schema changes.}
mcp.tool.execute_sql.arg.query.description=The SQL query to execute to answer a question.

# build stuff
quarkus.container-image.image=ghcr.io/harald-landvoigt/mcp-server-generic-jdbc
quarkus.container-image.tag=latest
application.timestamp=${timestamp}